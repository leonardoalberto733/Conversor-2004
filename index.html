<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor 2004</title>
    <link rel="stylesheet" href="index.css">
    <link rel="shortcut icon" href="converter.png" type="image/png">
</head>
<body id="corpo" style="background-image: url(imagens/img9.jpg);">
    <button id="btnMenu" onclick="toggleMenu()">☰</button>
    <div id="menu">
        <label for="inputTransparencia">Transparência</label>
        <input  type="range" name="transparencia" id="inputTransparencia" min="0" max="100" value="80" onchange="transparencia()">
        <button id="btnBackground" onclick="trocaImagem()">Background</button>

        <div id="selecionarOrientacao">
            <div>
                <label for="btnVertical">Vertical</label>
                <input type="radio" name="vert-hori" id="btnVertical" onchange="mudarOrientacao()">
            </div>
            <div>
                <label for="btnHorizontal">Horizontal</label>
                <input type="radio" name="vert-hori" id="btnHorizontal" onchange="mudarOrientacao()" checked>
            </div>
        </div>

    </div>

    <div id="input">
        
        <input id="entrada" autocomplete="off" id="entrada" placeholder="digite aqui">
        <button id="btnConv" onclick="conversor()">conv</button>
        <button id="btnApagar" onClick="apagar()">delete</button>

    </div>
    <div id="saida" style="background-color: rgba(255, 255, 255, 0.8);"></div>
    
    <script type="module" src="scripts/Pagina.js"></script>
    <script type="module" src="scripts/Geral.js"></script>
</body>
</html>
